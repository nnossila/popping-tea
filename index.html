<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popping Tea</title>
  <link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
        <div class="logo">Popping Tea</div>
        <nav>
            <ul>
                <li><a href="index.html"class="active">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="menu.html">Cardápio</a></li>
                <li><a href="contatos.html">Contatos</a></li>
            </ul>
        </nav>
        <div class="header-actions">
            <!-- <a href="#" onclick="trocarParaLogin(event)" class="sign-in">Entrar</a> -->
            <a href="#" onclick="abrirPopupCadastro()" class="btn-order">FAZER PEDIDO</a>
        </div>
    </header>
 
  <section class="banner" style="background-image: url(img/banner.jpg);">
    <div class="conteudo">
      <h1><span>Não é só Chá</span><br>É <span class="destaque">Popping Tea</span></h1>
      <p>
        Uma nova experiência de sabor, feita com ingredientes naturais e um toque especial que só o Popping Tea tem. Descubra o chá que virou tendência.
      </p>
      <a href="sobre.html" class="botao">SAIBA MAIS</a>
    </div>
    <div class="social">
      <a href="#"><img src="img/icons8-instagram.svg" alt="Instagram"></a>
      <a href="#"><img src="img/icons8-facebook.svg" alt="Facebook"></a>
      <a href="#"><img src="img/icons8-whatsapp.svg" alt="WhatsApp"></a>
    </div>
  </section>

  <div class="overlay" id="popupCadastro">
        <div class="popup-form">
            <button class="fechar" onclick="fecharCadastro()">×</button>
            <h2>Cadastro</h2>
            <form onsubmit="finalizarCadastro(event)">
                <input type="text" placeholder="Nome completo" required />
                <input type="email" placeholder="E-mail" required />
                <input type="password" placeholder="Senha" required />
                <input type="tel" placeholder="Telefone" required />
                <button type="submit">Cadastrar</button>
                <p class="link-login">Já tem conta? <a href="#" onclick="trocarParaLogin(event)">Entrar</a></p>
            </form>
        </div>
    </div>

   
    <div class="overlay" id="popupLogin">
        <div class="popup-form">
            <button class="fechar" onclick="fecharLogin()">×</button>
            <h2>Login</h2>
            <form onsubmit="fazerLogin(event)">
                <input type="text" placeholder="Nome completo" required />
                <input type="email" placeholder="E-mail" required />
                <input type="password" placeholder="Senha" required />
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>

    <script>
    function abrirPopupCadastro() {
            document.getElementById("popupCadastro").style.display = "flex";
        }

        function fecharCadastro() {
            document.getElementById("popupCadastro").style.display = "none";
        }

        function trocarParaLogin(event) {
            event.preventDefault();
            fecharCadastro();
            document.getElementById("popupLogin").style.display = "flex";
        }

        function fecharLogin() {
            document.getElementById("popupLogin").style.display = "none";
        }

        function finalizarCadastro(event) {
            event.preventDefault();
            alert("Cadastro concluído! Agora você será redirecionado para finalizar sua compra.");
            fecharCadastro();
        }

        function fazerLogin(event) {
            event.preventDefault();
            alert("Login realizado com sucesso!");
            fecharLogin();
        }
    </script>
</body>
</html>
